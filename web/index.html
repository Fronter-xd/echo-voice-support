<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Voice Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00ff88, #00cc6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 2rem;
            font-size: 0.875rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        
        .status-dot.connected {
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .voice-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
        }
        
        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 136, 0.5);
            background: rgba(0, 255, 136, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        
        .mic-button:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
        }
        
        .mic-button.recording {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            animation: pulse-ring 1.5s infinite;
        }
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        
        .mic-button svg {
            width: 48px;
            height: 48px;
            fill: #00ff88;
        }
        
        .status-text {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 1rem;
        }
        
        .transcript {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1.5rem;
            min-height: 80px;
            text-align: left;
        }
        
        .transcript-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .transcript-text {
            font-size: 0.875rem;
            color: #ccc;
            line-height: 1.6;
        }
        
        .timing-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .timing-item {
            text-align: center;
        }
        
        .timing-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #00ff88;
        }
        
        .timing-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
        }
        
        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Echo Voice Support</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </header>
        
        <div class="voice-panel">
            <button class="mic-button" id="micButton">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.03 2.03 5.59 5 6.01V9h2v2.01c2.97-.42 5-2.98 5-6.01h2c0 4.08-3.06 7.44-7 7.93V19h4v2h-6v-1.07z"/>
                </svg>
            </button>
            
            <p class="status-text" id="statusTextMain">Click to start speaking</p>
            
            <div class="transcript" id="transcriptContainer">
                <div class="transcript-label">Transcript</div>
                <div class="transcript-text" id="transcript">Your conversation will appear here...</div>
            </div>
            
            <div id="errorContainer"></div>
            
            <div class="timing-info" id="timingInfo" style="display: none;">
                <div class="timing-item">
                    <div class="timing-value" id="sttTime">-</div>
                    <div class="timing-label">STT (ms)</div>
                </div>
                <div class="timing-item">
                    <div class="timing-value" id="llmTime">-</div>
                    <div class="timing-label">LLM (ms)</div>
                </div>
                <div class="timing-item">
                    <div class="timing-value" id="ttsTime">-</div>
                    <div class="timing-label">TTS (ms)</div>
                </div>
                <div class="timing-item">
                    <div class="timing-value" id="totalTime">-</div>
                    <div class="timing-label">Total (ms)</div>
                </div>
            </div>
        </div>
        
        <p class="footer">
            Powered by Whisper • Llama-3 • Edge-TTS
        </p>
    </div>
    
    <script>
        class EchoVoiceClient {
            constructor() {
                this.ws = null;
                this.clientId = null;
                this.recording = false;
                this.mediaRecorder = null;
                this.audioContext = null;
                this.websocketUrl = 'ws://localhost:8765';
                
                this.initElements();
                this.initEventListeners();
                this.connect();
            }
            
            initElements() {
                this.micButton = document.getElementById('micButton');
                this.statusDot = document.getElementById('statusDot');
                this.statusText = document.getElementById('statusText');
                this.statusTextMain = document.getElementById('statusTextMain');
                this.transcript = document.getElementById('transcript');
                this.errorContainer = document.getElementById('errorContainer');
                this.timingInfo = document.getElementById('timingInfo');
            }
            
            initEventListeners() {
                this.micButton.addEventListener('click', () => this.toggleRecording());
            }
            
            connect() {
                try {
                    this.ws = new WebSocket(this.websocketUrl);
                    
                    this.ws.onopen = () => {
                        this.statusDot.classList.add('connected');
                        this.statusText.textContent = 'Connected';
                        this.statusTextMain.textContent = 'Click to start speaking';
                    };
                    
                    this.ws.onmessage = (event) => {
                        const message = JSON.parse(event.data);
                        this.handleMessage(message);
                    };
                    
                    this.ws.onclose = () => {
                        this.statusDot.classList.remove('connected');
                        this.statusText.textContent = 'Disconnected';
                        setTimeout(() => this.connect(), 3000);
                    };
                    
                    this.ws.onerror = (error) => {
                        this.showError('Connection error. Retrying...');
                    };
                    
                } catch (error) {
                    this.showError('Failed to connect to server');
                    setTimeout(() => this.connect(), 3000);
                }
            }
            
            handleMessage(message) {
                switch (message.type) {
                    case 'connected':
                        this.clientId = message.client_id;
                        break;
                        
                    case 'response_audio':
                        this.handleResponse(message);
                        break;
                        
                    case 'pong':
                        break;
                        
                    case 'error':
                        this.showError(message.message);
                        break;
                }
            }
            
            async toggleRecording() {
                if (this.recording) {
                    this.stopRecording();
                } else {
                    await this.startRecording();
                }
            }
            
            async startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            sampleRate: 16000,
                            echoCancellation: true,
                            noiseSuppression: true
                        } 
                    });
                    
                    this.audioContext = new AudioContext({ sampleRate: 16000 });
                    const source = this.audioContext.createMediaStreamSource(stream);
                    
                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });
                    
                    const chunks = [];
                    
                    this.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            chunks.push(e.data);
                        }
                    };
                    
                    this.mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                        await this.sendAudio(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    this.mediaRecorder.start();
                    this.recording = true;
                    this.micButton.classList.add('recording');
                    this.statusTextMain.textContent = 'Listening...';
                    
                } catch (error) {
                    this.showError('Microphone access denied');
                }
            }
            
            stopRecording() {
                if (this.mediaRecorder && this.recording) {
                    this.mediaRecorder.stop();
                    this.recording = false;
                    this.micButton.classList.remove('recording');
                    this.statusTextMain.textContent = 'Processing...';
                }
            }
            
            async sendAudio(blob) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    
                    this.ws.send(JSON.stringify({
                        type: 'audio',
                        data: base64
                    }));
                };
                reader.readAsDataURL(blob);
            }
            
            handleResponse(response) {
                this.transcript.innerHTML = `
                    <p><strong>You:</strong> ${response.transcript || '...'}</p>
                    <p><strong>Echo:</strong> ${response.response}</p>
                `;
                
                if (response.timing) {
                    this.timingInfo.style.display = 'grid';
                    document.getElementById('sttTime').textContent = response.timing.stt_ms?.toFixed(0) || '-';
                    document.getElementById('llmTime').textContent = response.timing.llm_ms?.toFixed(0) || '-';
                    document.getElementById('ttsTime').textContent = response.timing.tts_ms?.toFixed(0) || '-';
                    document.getElementById('totalTime').textContent = response.timing.total_ms?.toFixed(0) || '-';
                }
                
                const base64Audio = response.data;
                const audioBlob = new Blob(
                    [Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0))],
                    { type: 'audio/mp3' }
                );
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
                
                this.statusTextMain.textContent = 'Click to start speaking';
            }
            
            showError(message) {
                this.errorContainer.innerHTML = `<div class="error">${message}</div>`;
                setTimeout(() => {
                    this.errorContainer.innerHTML = '';
                }, 5000);
            }
        }
        
        const client = new EchoVoiceClient();
    </script>
</body>
</html>
